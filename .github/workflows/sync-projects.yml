name: Sync Projects

# Runs on a schedule, and can be triggered manually from the Actions tab
# any time right after you edit the Google Sheet.
on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC — adjust as you like
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Reuses the same personal access token set up for the
          # Publications sync — see README for why the default
          # token isn't enough in this org.
          token: ${{ secrets.PUBLICATIONS_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch sheets and regenerate project pages + projects.html
        env:
          PROJECTS_SHEET_CSV_URL: ${{ vars.PROJECTS_SHEET_CSV_URL }}
          MEMBERS_SHEET_CSV_URL: ${{ vars.MEMBERS_SHEET_CSV_URL }}
          MEMBER_ACTIVITIES_SHEET_CSV_URL: ${{ vars.MEMBER_ACTIVITIES_SHEET_CSV_URL }}
        run: python scripts/sync_projects.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects.html projects/
          if git diff --staged --quiet; then
            echo "No changes to project pages."
          else
            git commit -m "chore: sync projects from Google Sheet [skip ci]"
            git push
          fi
