name: Sync Publications

# Runs on a schedule, and can be triggered manually from the Actions tab
# any time right after you edit the Google Sheet.
on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC — adjust as you like
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLICATIONS_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch sheet and rebuild data/publications.json
        env:
          PUBLICATIONS_SHEET_CSV_URL: ${{ vars.PUBLICATIONS_SHEET_CSV_URL }}
        run: python scripts/sync_publications.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          if git diff --staged --quiet; then
            echo "No changes to publications data."
          else
            git commit -m "chore: sync publications from Google Sheet [skip ci]"
            git push
          fi
